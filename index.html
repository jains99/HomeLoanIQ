<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── Palette ────────────────────────────────────────────────────────
    const C = {
      bg:"#f9f8f6", surface:"#ffffff", surfaceAlt:"#f3f1ee",
      border:"#e5e2dc", text:"#1a1915", textMid:"#5a574f", textSub:"#9a968c",
      accent:"#c96442", accentBg:"#fdf1ed", accentBdr:"#f0c4b4",
      green:"#2d7d52", greenBg:"#edf7f2", greenBdr:"#b8dfc8",
      red:"#c94040", redBg:"#fdf0f0", redBdr:"#f0c4c4",
      blue:"#2d5fa0", blueBg:"#edf2fb", blueBdr:"#b8cff0",
      purple:"#6b4fb8", purpleBg:"#f3f0fb", purpleBdr:"#cfc4f0",
      teal:"#1e7a7a", tealBg:"#edf6f6", tealBdr:"#b8dede",
    };

    const formatINR = (n) =>
      new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
    const formatNum = (n) =>
      new Intl.NumberFormat("en-IN",{maximumFractionDigits:0}).format(n);

    // ── Core calc ──────────────────────────────────────────────────────
    // startDate lets the rate-sim suffix anchor labels to the rate-change month (BUG-6)
    function calcSchedule(principal, annualRate, emi, prepayments=[], startDate=new Date()) {
      const mr = annualRate / 100 / 12;
      let bal = principal, month = 0, totInt = 0, totPrin = 0;
      const out = [];
      while (bal > 0.5 && month < 600) {
        month++;
        const interest = bal * mr;
        let prin = Math.min(emi - interest, bal);
        if (prin < 0) prin = 0;
        const date = new Date(startDate);
        date.setMonth(date.getMonth() + month - 1);
        const yr = date.getFullYear(), mo = date.getMonth() + 1;
        // BUG-7: accumulate all prepayments for this month, then cap once
        let prepay = 0;
        prepayments.forEach(p => {
          if (p.year===yr && p.month===mo && Number(p.amount)>0)
            prepay += Number(p.amount);
        });
        prepay = Math.min(prepay, bal - prin);
        const tp = prin + prepay;
        bal = Math.max(bal - tp, 0);
        totInt += interest; totPrin += tp;
        out.push({
          month, year:yr, mo,
          label:`${date.toLocaleString("en-IN",{month:"short"})} ${yr}`,
          openingBalance: bal + tp,
          emi, interest, principal:prin, prepay,
          closingBalance:bal, totalInterest:totInt, totalPrincipal:totPrin,
        });
        if (bal <= 0.5) break;
      }
      // BUG-13: flag truncation so the UI can warn the user
      if (month >= 600 && bal > 0.5) out.truncated = true;
      return out;
    }

    function calcEMI(p, r, n) {
      const mr = r / 100 / 12;
      if (mr === 0) return p / n;
      return p * mr * Math.pow(1+mr,n) / (Math.pow(1+mr,n)-1);
    }

    // ── Overdraft loan calc ────────────────────────────────────────────
    // Interest is charged only on (loan balance − savings parked in OD account).
    // Savings are accessible anytime; they just offset the daily interest base.
    function calcODSchedule(principal, annualRate, emi, startingOD, monthlyNetCredit, prepayments=[]) {
      const mr = annualRate / 100 / 12;
      let bal = principal;
      // OD balance can't exceed the loan outstanding
      let odBal = Math.min(startingOD, principal);
      let month = 0, totInt = 0, totPrin = 0;
      const out = [];
      while (bal > 0.5 && month < 600) {
        month++;
        // Monthly surplus credited to OD account (capped at loan outstanding)
        odBal = Math.min(odBal + monthlyNetCredit, bal);
        // Interest only on net outstanding
        const effectiveBal = Math.max(bal - odBal, 0);
        const interest = effectiveBal * mr;
        let prin = Math.min(emi - interest, bal);
        if (prin < 0) prin = 0;
        const date = new Date();
        date.setMonth(date.getMonth() + month - 1);
        const yr = date.getFullYear(), mo = date.getMonth() + 1;
        // BUG-7: accumulate all prepayments for this month, then cap once
        let prepay = 0;
        prepayments.forEach(p => {
          if (p.year===yr && p.month===mo && Number(p.amount)>0)
            prepay += Number(p.amount);
        });
        prepay = Math.min(prepay, bal - prin);
        const tp = prin + prepay;
        bal = Math.max(bal - tp, 0);
        // OD balance can't exceed new loan outstanding
        odBal = Math.min(odBal, bal);
        totInt += interest; totPrin += tp;
        out.push({
          month, year:yr, mo,
          label:`${date.toLocaleString("en-IN",{month:"short"})} ${yr}`,
          openingBalance: bal + tp,
          emi, interest, principal:prin, prepay,
          closingBalance:bal, odBalance:odBal, effectiveBal,
          totalInterest:totInt, totalPrincipal:totPrin,
        });
        if (bal <= 0.5) break;
      }
      // BUG-13: flag truncation so the UI can warn the user
      if (month >= 600 && bal > 0.5) out.truncated = true;
      return out;
    }

    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    // ── Small components ───────────────────────────────────────────────
    function Label({children}) {
      return <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,
        textTransform:"uppercase",color:C.textSub,marginBottom:7}}>{children}</div>;
    }
    function Card({children,style={}}) {
      return <div style={{background:C.surface,border:`1px solid ${C.border}`,
        borderRadius:12,padding:"18px 20px",...style}}>{children}</div>;
    }
    function TextInput({raw,setRaw,prefix,suffix,placeholder="0",disabled=false}) {
      const [focused,setFocused] = useState(false);
      const formatted = (() => {
        const n = parseFloat(raw);
        if (!raw || raw.trim()==="" || isNaN(n)) return "";
        return new Intl.NumberFormat("en-IN",{maximumFractionDigits:2}).format(n);
      })();
      return (
        <div style={{display:"flex",alignItems:"center",gap:6,
          background:disabled?C.bg:C.surfaceAlt,
          border:`1.5px solid ${focused?C.accent:C.border}`,
          borderRadius:8,padding:"10px 12px",transition:"border-color 0.15s",
          opacity:disabled?0.6:1}}>
          {prefix&&<span style={{color:C.textSub,fontSize:15,flexShrink:0}}>{prefix}</span>}
          <input
            type="text" inputMode="decimal"
            value={focused ? raw : formatted}
            placeholder={placeholder}
            disabled={disabled}
            onChange={e => setRaw(e.target.value.replace(/,/g,""))}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            style={{background:"transparent",border:"none",outline:"none",
              color:C.text,fontSize:20,fontWeight:700,width:"100%",
              fontFamily:"'SF Mono','Fira Code',monospace",cursor:disabled?"default":"text"}}/>
          {suffix&&<span style={{color:C.textSub,fontSize:15,flexShrink:0}}>{suffix}</span>}
        </div>
      );
    }
    function PrepayInput({value, onChange}) {
      const [focused, setFocused] = useState(false);
      const formatted = (() => {
        const n = parseFloat(value);
        if (value==="" || value===undefined || isNaN(n)) return String(value);
        return new Intl.NumberFormat("en-IN",{maximumFractionDigits:0}).format(n);
      })();
      return (
        <input
          type="text" inputMode="decimal"
          value={focused ? String(value) : formatted}
          onChange={e => onChange(e.target.value.replace(/,/g,""))}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{width:"100%",background:C.surface,border:`1.5px solid ${focused?C.accent:C.border}`,
            borderRadius:6,color:C.text,padding:"7px 8px",fontSize:13,
            fontFamily:"'SF Mono','Fira Code',monospace",boxSizing:"border-box",outline:"none",
            transition:"border-color 0.15s"}}/>
      );
    }

    function StatCard({label,value,sub,color,bg,bdr}) {
      return (
        <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",
            color,marginBottom:5,opacity:0.7}}>{label}</div>
          <div style={{fontSize:18,fontWeight:800,color,fontFamily:"'SF Mono','Fira Code',monospace"}}>{value}</div>
          <div style={{fontSize:13,color,marginTop:4,opacity:0.6}}>{sub}</div>
        </div>
      );
    }
    function SectionToggle({title,subtitle,active,onToggle,color=C.accent,bg=C.accentBg,bdr=C.accentBdr}) {
      return (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:C.text}}>{title}</div>
            <div style={{fontSize:12,color:C.textSub,marginTop:2}}>{subtitle}</div>
          </div>
          <button onClick={onToggle} style={{
            background:active?bg:C.surfaceAlt,
            border:`1px solid ${active?bdr:C.border}`,
            borderRadius:7,color:active?color:C.textMid,
            fontSize:12,fontWeight:700,padding:"7px 14px",cursor:"pointer"}}>
            {active?"Hide":"Open"}
          </button>
        </div>
      );
    }

    // ── Export helpers ─────────────────────────────────────────────────
    function exportCSV(schedule, outstanding, rate, emi) {
      const header = ["Month#","Period","Opening Balance","EMI","Interest","Principal","Prepayment","Closing Balance","Cumulative Interest"];
      const rows = schedule.map(r => [
        r.month, r.label,
        r.openingBalance.toFixed(2), r.emi.toFixed(2),
        r.interest.toFixed(2), r.principal.toFixed(2),
        r.prepay.toFixed(2), r.closingBalance.toFixed(2),
        r.totalInterest.toFixed(2),
      ]);
      const meta = [
        ["Outstanding Principal", outstanding],
        ["Annual Rate (%)", rate],
        ["Monthly EMI", emi],
        ["Total Months", schedule.length],
        ["Total Interest", schedule[schedule.length-1]?.totalInterest.toFixed(2)],
        ["Total Payment", (outstanding + (schedule[schedule.length-1]?.totalInterest||0)).toFixed(2)],
        [],
      ];
      const csvContent = [
        ...meta.map(r=>r.join(",")),
        header.join(","),
        ...rows.map(r=>r.join(",")),
      ].join("\n");
      const encoded = "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);
      const a = document.createElement("a");
      a.href=encoded; a.download="homeloaniq-schedule.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function exportPDF(schedule, outstanding, rate, emi) {
      const totalInterest = schedule[schedule.length-1]?.totalInterest || 0;
      const totalPayment = outstanding + totalInterest;
      const endDate = schedule[schedule.length-1]?.label || "";
      const rows = schedule.map(r=>`
        <tr style="background:${r.prepay>0?"#edf2fb":r.rateChanged?"#f3f0fb":"white"}">
          <td>${r.month}</td><td>${r.label}</td>
          <td>₹${formatNum(r.openingBalance)}</td>
          <td>₹${formatNum(r.emi)}</td>
          <td style="color:#c94040">₹${formatNum(r.interest)}</td>
          <td style="color:#2d7d52">₹${formatNum(r.principal)}</td>
          <td style="color:${r.prepay>0?"#2d5fa0":"#aaa"}">${r.prepay>0?"₹"+formatNum(r.prepay):"—"}</td>
          <td><strong>₹${formatNum(r.closingBalance)}</strong></td>
        </tr>`).join("");

      const html=`<!DOCTYPE html><html><head><meta charset="utf-8">
      <title>Loan Schedule</title>
      <style>
        body{font-family:sans-serif;font-size:11px;color:#1a1915;margin:24px}
        h1{font-size:18px;margin:0 0 4px}
        .meta{display:flex;gap:32px;margin-bottom:16px;flex-wrap:wrap}
        .meta-item label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#9a968c;display:block}
        .meta-item span{font-size:14px;font-weight:800;font-family:monospace}
        table{width:100%;border-collapse:collapse;font-size:10px}
        th{background:#f3f1ee;padding:6px 10px;text-align:right;font-size:9px;
           text-transform:uppercase;letter-spacing:.8px;color:#9a968c;border-bottom:1px solid #e5e2dc}
        td{padding:5px 10px;text-align:right;border-bottom:1px solid #f0ede8}
        @media print{body{margin:0}}
      </style></head><body>
      <h1>HomeLoanIQ — Loan Schedule</h1>
      <p style="color:#9a968c;margin:0 0 16px;font-size:11px">Generated ${new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</p>
      <div class="meta">
        <div class="meta-item"><label>Outstanding</label><span>₹${formatNum(outstanding)}</span></div>
        <div class="meta-item"><label>Rate (p.a.)</label><span>${rate}%</span></div>
        <div class="meta-item"><label>Monthly EMI</label><span>₹${formatNum(emi)}</span></div>
        <div class="meta-item"><label>Total Months</label><span>${schedule.length}</span></div>
        <div class="meta-item"><label>Loan Closes</label><span>${endDate}</span></div>
        <div class="meta-item"><label>Total Interest</label><span style="color:#c94040">₹${formatNum(totalInterest)}</span></div>
        <div class="meta-item"><label>Total Outflow</label><span>₹${formatNum(totalPayment)}</span></div>
      </div>
      <table>
        <thead><tr>
          <th>#</th><th>Month</th><th>Opening</th><th>EMI</th>
          <th>Interest</th><th>Principal</th><th>Prepayment</th><th>Closing</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="margin-top:16px;font-size:9px;color:#9a968c">Indicative only. Actual schedules vary by bank policy and compounding.</p>
      </body></html>`;

      const w = window.open("","_blank");
      if (!w) { alert("Please allow popups to export as PDF."); return; }
      w.document.write(html);
      w.document.close();
      w.focus();
      setTimeout(()=>{w.print();},400);
    }

    // ── Main ───────────────────────────────────────────────────────────
    function HomeLoanCalculator() {
      const [outstandingRaw,setOutstandingRaw] = useState("3000000");
      const [rateRaw,setRateRaw]               = useState("7.2");
      const [emiRaw,setEmiRaw]                 = useState("30000");
      const [prepayments,setPrepayments]       = useState([]);
      const [activeTab,setActiveTab]   = useState("summary");
      const [showAll,setShowAll]       = useState(false);

      const [showRateSim,setShowRateSim]           = useState(false);
      const [newRateRaw,setNewRateRaw]             = useState("");
      const [rateChangeMonth,setRateChangeMonth]   = useState(new Date().getMonth()+1);
      const [rateChangeYear,setRateChangeYear]     = useState(new Date().getFullYear()+1);

      const [showOptimizer,setShowOptimizer]       = useState(false);
      const [targetMonthsRaw,setTargetMonthsRaw]   = useState("");
      const [targetDateMonth,setTargetDateMonth]   = useState(new Date().getMonth()+1);
      const [targetDateYear,setTargetDateYear]     = useState(new Date().getFullYear()+5);
      const [optimizerMode,setOptimizerMode]       = useState("months");

      // OD comparison
      const [showPrepayments,setShowPrepayments]   = useState(true);
      const [showOD,setShowOD]                     = useState(false);
      const [odStartRaw,setOdStartRaw]             = useState("200000");
      const [odMonthlyRaw,setOdMonthlyRaw]         = useState("30000");
      const [odRatePremiumRaw,setOdRatePremiumRaw] = useState("0.5");

      const outstanding = parseFloat(outstandingRaw)||0;
      const rate        = parseFloat(rateRaw)||0;
      const emi         = parseFloat(emiRaw)||0;
      const newRate     = parseFloat(newRateRaw)||0;

      const schedule = useMemo(()=>
        outstanding>0&&rate>0&&emi>0 ? calcSchedule(outstanding,rate,emi,prepayments) : [],
        [outstanding,rate,emi,prepayments]);

      const scheduleWithout = useMemo(()=>
        outstanding>0&&rate>0&&emi>0 ? calcSchedule(outstanding,rate,emi,[]) : [],
        [outstanding,rate,emi]);

      const scheduleRateSim = useMemo(()=>{
        if (!showRateSim||newRate<=0||schedule.length===0) return [];
        const si = schedule.findIndex(r=>r.year===rateChangeYear&&r.mo===rateChangeMonth);
        if (si<0) return [];
        const bal = schedule[si].openingBalance;
        const fp = prepayments.filter(p=>{
          return new Date(p.year,p.month-1)>=new Date(rateChangeYear,rateChangeMonth-1);
        });
        // BUG-5/6: pass rate-change date so labels continue correctly; remap month field so it's monotonic
        const rateChangeDate = new Date(rateChangeYear, rateChangeMonth - 1);
        const suffix = calcSchedule(bal,newRate,emi,fp,rateChangeDate)
          .map((r,i)=>({...r, rateChanged:true, month:si+1+i}));
        return [...schedule.slice(0,si),...suffix];
      },[showRateSim,newRate,rateChangeYear,rateChangeMonth,schedule,emi,prepayments]);

      const activeSchedule = showRateSim&&scheduleRateSim.length>0 ? scheduleRateSim : schedule;

      const optimizerResult = useMemo(()=>{
        if (!showOptimizer||outstanding<=0||rate<=0) return null;
        let targetMonths;
        if (optimizerMode==="months") {
          targetMonths = parseInt(targetMonthsRaw)||0;
        } else {
          // BUG-9: arithmetic month difference is exact and independent of current day-within-month
          const now = new Date();
          targetMonths = (targetDateYear - now.getFullYear()) * 12
                       + (targetDateMonth - 1 - now.getMonth());
        }
        if (targetMonths<=0) return null;
        const suggestedEMI = Math.ceil(calcEMI(outstanding,rate,targetMonths));
        const minRequired = Math.ceil(outstanding*(rate/100/12)*1.01);
        if (suggestedEMI<minRequired) return {error:`Loan can't close in ${targetMonths} months — too short for this principal/rate.`};
        const sim = calcSchedule(outstanding,rate,suggestedEMI,prepayments);
        const currentTotalInterest = scheduleWithout[scheduleWithout.length-1]?.totalInterest||0;
        const newTotalInterest = sim[sim.length-1]?.totalInterest||0;
        return {
          targetMonths,
          suggestedEMI,
          actualMonths: sim.length,
          endDate: sim[sim.length-1]?.label,
          interestSaved: currentTotalInterest - newTotalInterest,
          extraPerMonth: suggestedEMI - emi,
          currentMonths: schedule.length,
        };
      },[showOptimizer,optimizerMode,targetMonthsRaw,targetDateMonth,targetDateYear,outstanding,rate,emi,prepayments,schedule,scheduleWithout]);

      const totalMonths   = activeSchedule.length;
      const totalInterest = activeSchedule[activeSchedule.length-1]?.totalInterest||0;
      const totalPayment  = outstanding+totalInterest;
      const savedMonths   = scheduleWithout.length - schedule.length;
      // BUG-11/12: always compare against schedule (base rate), not activeSchedule, so both figures
      // use the same schedule pair regardless of whether the rate-sim is on
      const savedInterest = (scheduleWithout[scheduleWithout.length-1]?.totalInterest||0)
                          - (schedule[schedule.length-1]?.totalInterest||0);
      const endDate       = activeSchedule[activeSchedule.length-1]?.label||"—";
      const minEmi        = outstanding>0&&rate>0 ? Math.ceil(outstanding*(rate/100/12)*1.01) : 0;
      const rateSimDiff   = (scheduleRateSim[scheduleRateSim.length-1]?.totalInterest||0)-(schedule[schedule.length-1]?.totalInterest||0);

      const odStart        = parseFloat(odStartRaw)||0;
      const odMonthly      = parseFloat(odMonthlyRaw)||0;
      const odRatePremium  = parseFloat(odRatePremiumRaw)||0;
      const odEffectiveRate = rate + odRatePremium;

      const scheduleOD = useMemo(()=>{
        if (!showOD||outstanding<=0||rate<=0||emi<=0) return [];
        return calcODSchedule(outstanding, odEffectiveRate, emi, odStart, odMonthly, prepayments);
      },[showOD,outstanding,odEffectiveRate,emi,odStart,odMonthly,prepayments]);

      // BUG-10: run OD at base rate to compute true premium cost (not an approximation)
      const scheduleODBaseRate = useMemo(()=>{
        if (!showOD||outstanding<=0||rate<=0||emi<=0||odRatePremium<=0) return [];
        return calcODSchedule(outstanding, rate, emi, odStart, odMonthly, prepayments);
      },[showOD,outstanding,rate,emi,odStart,odMonthly,prepayments,odRatePremium]);

      const odTotalInterest  = scheduleOD[scheduleOD.length-1]?.totalInterest||0;
      const regTotalInterest = schedule[schedule.length-1]?.totalInterest||0;
      const odSavedInterest  = Math.max(regTotalInterest - odTotalInterest, 0);
      const odSavedMonths    = Math.max(schedule.length - scheduleOD.length, 0);
      // BUG-10: true premium cost = OD interest at premium rate minus OD interest at base rate
      const odBaseRateInterest = scheduleODBaseRate[scheduleODBaseRate.length-1]?.totalInterest||0;
      const odPremiumCost      = odRatePremium>0 ? Math.max(odTotalInterest - odBaseRateInterest, 0) : 0;

      const addPrepayment = ()=>{
        // BUG-4: use setMonth to safely advance 1 month (handles December year rollover)
        const d=new Date(); d.setMonth(d.getMonth()+1);
        setPrepayments([...prepayments,{id:Date.now(),year:d.getFullYear(),month:d.getMonth()+1,amount:50000}]);
      };
      const removePrepayment = (id)=>setPrepayments(prepayments.filter(p=>p.id!==id));
      const updatePrepayment = (id,field,val)=>
        setPrepayments(prepayments.map(p=>p.id===id?{...p,[field]:val}:p));

      // BUG-18: separate toggle from addPrepayment so "Hide" collapses instead of adding a row
      const togglePrepayments = () => {
        if (showPrepayments) { setShowPrepayments(false); }
        else { setShowPrepayments(true); if (prepayments.length===0) addPrepayment(); }
      };

      const displayedRows = showAll ? activeSchedule : activeSchedule.slice(0,24);
      const years = Array.from({length:25},(_,i)=>new Date().getFullYear()+i);

      return (
        <div style={{fontFamily:"-apple-system,'Segoe UI',sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>

          {/* Header */}
          <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"18px 24px 14px"}}>
            <div style={{maxWidth:960,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:C.accent}}/>
                  <span style={{fontSize:10,letterSpacing:3,color:C.textSub,textTransform:"uppercase",fontWeight:700}}>India · Home Loan</span>
                </div>
                <h1 style={{margin:0,fontSize:22,fontWeight:800,color:C.text,letterSpacing:-0.5}}>HomeLoanIQ</h1>
                <p style={{margin:"3px 0 0",fontSize:12,color:C.textSub}}>EMI · Prepayments · Rate simulation · Optimizer · Export</p>
              </div>
              {schedule.length>0&&(
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>exportCSV(activeSchedule,outstanding,rate,emi)} style={{
                    background:C.greenBg,border:`1px solid ${C.greenBdr}`,borderRadius:7,
                    color:C.green,fontSize:12,fontWeight:700,padding:"8px 14px",cursor:"pointer",
                    display:"flex",alignItems:"center",gap:5}}>
                    &#8595; CSV
                  </button>
                  <button onClick={()=>exportPDF(activeSchedule,outstanding,rate,emi)} style={{
                    background:C.blueBg,border:`1px solid ${C.blueBdr}`,borderRadius:7,

                              <span style={{fontSize:11,color:C.textSub,width:38,flexShrink:0,textAlign:"right"}}>Yr {yi+1}</span>
                              <div style={{flex:1,background:C.surfaceAlt,borderRadius:5,height:16,
                                overflow:"hidden",position:"relative"}}>
                                <div style={{
                                  width:`${pct}%`,height:"100%",borderRadius:5,
                                  background:hasRateChg ? C.purple : hasPrepay ? C.blue : C.green,
                                  transition:"width 0.4s"
                                }}/>
                                {hasPrepay&&!hasRateChg&&<span style={{position:"absolute",right:4,top:1,
                                  fontSize:9,color:C.blue,fontWeight:700}}>prepaid</span>}
                                {hasRateChg&&<span style={{position:"absolute",right:4,top:1,
                                  fontSize:9,color:C.purple,fontWeight:700}}>rate&#8597;</span>}
                              </div>
                              <span style={{fontSize:11,color:C.textMid,
                                fontFamily:"'SF Mono','Fira Code',monospace",
                                width:88,textAlign:"right",flexShrink:0}}>{formatINR(row.closingBalance)}</span>
                              <span style={{fontSize:10,color:C.textSub,width:32,textAlign:"right",flexShrink:0}}>{pct.toFixed(0)}%</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Prepayment impact */}
                    {savedMonths>0&&(
                      <div style={{background:C.greenBg,border:`1px solid ${C.greenBdr}`,
                        borderRadius:8,padding:"14px 16px"}}>
                        <div style={{fontSize:10,fontWeight:700,color:C.green,letterSpacing:1.2,
                          textTransform:"uppercase",marginBottom:10}}>Prepayment Impact</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,textAlign:"center"}}>
                          {[["Months Saved",`${savedMonths}`],["Interest Saved",formatINR(savedInterest)],["New End Date",endDate]].map(([l,v])=>(
                            <div key={l}>
                              <div style={{fontSize:10,color:C.green,opacity:0.7,fontWeight:600}}>{l}</div>
                              <div style={{fontSize:16,fontWeight:800,color:C.green,
                                fontFamily:"'SF Mono','Fira Code',monospace"}}>{v}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </Card>
                )}

                {/* Schedule Tab */}
                {activeTab==="schedule"&&(
                  <Card style={{padding:0,overflow:"hidden",borderTopLeftRadius:0,borderTopRightRadius:4}}>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,
                        fontFamily:"'SF Mono','Fira Code',monospace"}}>
                        <thead>
                          <tr style={{background:C.surfaceAlt}}>
                            {["#","Month","Opening","EMI","Interest","Principal","Prepay","Closing"].map(h=>(
                              <th key={h} style={{padding:"10px 14px",textAlign:"right",color:C.textSub,
                                fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",
                                borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {displayedRows.map((row,i)=>{
                            const isPrepay=row.prepay>0, isRateChg=row.rateChanged;
                            const bg=isPrepay?C.blueBg:isRateChg?C.purpleBg:i%2===0?C.surface:C.surfaceAlt;
                            return (
                              <tr key={i} style={{background:bg,borderBottom:`1px solid ${C.border}`}}>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.textSub}}>{row.month}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",
                                  color:isRateChg?C.purple:isPrepay?C.blue:C.accent,
                                  fontWeight:(isPrepay||isRateChg)?700:500}}>{row.label}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.textMid}}>{formatNum(row.openingBalance)}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.text}}>{formatNum(row.emi)}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.red}}>{formatNum(row.interest)}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.green}}>{formatNum(row.principal)}</td>
                                <td style={{padding:"7px 14px",textAlign:"right",
                                  color:isPrepay?C.blue:C.textSub,fontWeight:isPrepay?700:400}}>
                                  {isPrepay?formatNum(row.prepay):"—"}
                                </td>
                                <td style={{padding:"7px 14px",textAlign:"right",color:C.text,fontWeight:700}}>
                                  {formatNum(row.closingBalance)}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    {activeSchedule.length>24&&(
                      <div style={{textAlign:"center",padding:"12px",borderTop:`1px solid ${C.border}`}}>
                        <button onClick={()=>setShowAll(!showAll)} style={{
                          background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:6,
                          color:C.textMid,fontSize:12,padding:"6px 18px",cursor:"pointer"}}>
                          {showAll?"Show less":`Show all ${activeSchedule.length} rows`}
                        </button>
                      </div>
                    )}
                  </Card>
                )}
              </>
            )}

            <div style={{marginTop:16,fontSize:11,color:C.textSub,textAlign:"center"}}>
              Indicative only · Actual schedules vary by bank policy, compounding method, and rate revisions
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<HomeLoanCalculator/>);
  </script>
</body>
</html>
